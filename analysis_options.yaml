include: package:flutter_lints/flutter.yaml

analyzer:
  # Ігноруємо згенеровані файли, щоб лінтер на них не сварився
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"

linter:
  rules:
    # 🔴 КРИТИЧНІ ПРАВИЛА БЕЗПЕКИ
    unawaited_futures: true         # Забороняє викликати Future без await (крім випадків з unawaited())
    avoid_dynamic_calls: true       # Забороняє викликати методи у об'єктів типу dynamic
    
    # 🟡 ПРАВИЛА ХОРОШОГО ТОНУ ТА СТАБІЛЬНОСТІ
    always_declare_return_types: true # Вимагає завжди вказувати, що повертає функція (наприклад, void, int)
    empty_catches: true               # Забороняє залишати catch (e) {} порожнім (помилки треба логувати)
    cancel_subscriptions: true        # Нагадує скасовувати підписки на Stream, щоб не було витоку пам'яті
    require_trailing_commas: true     # Вимагає коми в кінці параметрів (допомагає форматуванню коду)
    prefer_final_locals: true         # Рекомендує final для локальних змінних (покращує читабельність та надійність)

    # 🟢 ПРАВИЛА СТИЛЮ
    prefer_single_quotes: true        # Одинарні лапки для рядків замість подвійних
    prefer_const_constructors: true
    prefer_const_declarations: true